<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🧠 AI Health Journal</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <!-- Toast container -->
  <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

  <div class="layout">
    <!-- Main Journal Area -->
    <div class="container">
      <div class="card-topbar">
        <button id="sidebar-toggle" onclick="toggleSidebar()" title="Toggle chat history" aria-label="Toggle history sidebar">📜 History</button>
        <button class="toggle-switch" onclick="toggleTheme()" title="Toggle dark/light mode" aria-label="Toggle theme">🌃 Theme</button>
      </div>
      <h1>🧠 AI Health Journal</h1>

      <!-- Read-only status: models are chosen automatically, never picked by the user -->
      <div class="model-status" style="position: relative;">
        <span id="model-status-text">Draft → Verify → Refine</span>
        <button id="model-info-icon" class="info-icon" title="Which models are working on this" onclick="toggleModelInfo()" aria-expanded="false" aria-controls="model-info">ℹ️</button>
        <div id="model-info" class="info-tooltip" style="display: none;" role="tooltip">
          <div class="tooltip-content">
            <strong>Working on your entry</strong>
            <p id="model-info-summary"></p>
            <ul id="model-info-details"></ul>
            <button onclick="toggleModelInfo()" class="close-tooltip">Got it</button>
          </div>
        </div>
      </div>

      <!-- Stage progress indicator (quality mode only) -->
      <div id="stage-indicator" class="stage-indicator" style="display:none;" aria-label="Analysis progress">
        <div class="stage" id="stage-draft">✏️ Drafting</div>
        <div class="stage-arrow">→</div>
        <div class="stage" id="stage-verify">🔍 Verifying</div>
        <div class="stage-arrow">→</div>
        <div class="stage" id="stage-revise">✨ Refining</div>
      </div>

      <!-- Insights display -->
      <div class="insights-panel">
        <div class="insights-panel-header">
          <h2 class="insights-header">💡 Insights</h2>
          <button id="copy-insight-btn" class="copy-insight-btn" onclick="copyInsightText()" title="Copy insight text" style="display:none;">📋 Copy</button>
        </div>
        <div id="insight-box" role="region" aria-label="Analysis output" aria-live="polite"></div>

        <!-- Sources (RAG) -->
        <div id="sources-container" style="display:none;">
          <button id="sources-toggle" onclick="toggleSources()">🔍 Show sources</button>
          <div id="sources-list"></div>
        </div>
      </div>

      <!-- Unified input command center -->
      <div class="textarea-wrapper">
        <textarea
          id="journal-entry"
          placeholder="Write your thoughts here..."
          autofocus
          maxlength="1000"
          aria-label="Journal entry"
        ></textarea>
        <div class="input-icons">
          <button id="record-button" onclick="toggleRecording()" class="icon-pill" aria-label="Start voice recording" title="Record voice entry">🎙️</button>
          <button onclick="getPrompt()" class="icon-pill" aria-label="Suggest a journaling prompt" title="Suggest a prompt">✨</button>
        </div>
      </div>
      <span id="record-status" aria-live="polite"></span>
      <div class="textarea-meta">
        <span class="keyboard-hint">Enter to analyze &nbsp;·&nbsp; Shift+Enter for new line</span>
        <span id="char-counter" class="char-counter">0 / 1000</span>
      </div>

      <!-- Action buttons -->
      <div class="button-group">
        <button onclick="newSession()" class="btn-ghost-neutral">＋ New Session</button>
        <div class="run-controls">
          <button onclick="submitEntry()" class="btn-primary" id="analyze-btn">🚀 Analyze</button>
          <button onclick="abortResponse()" id="stop-button" class="btn-stop" style="display:none;" aria-label="Stop current analysis">🛑 Stop</button>
        </div>
      </div>
    </div>

    <!-- Chat History Sidebar -->
    <div id="sidebar" class="hidden" aria-label="Chat history">
      <h2>📜 History</h2>
      <ul id="history-list" role="list"></ul>
      <!-- Expanded history detail view -->
      <div id="history-detail" class="history-detail" style="display:none;">
        <button class="history-detail-close" onclick="closeHistoryDetail()">✕ Close</button>
        <div id="history-detail-entry" class="history-detail-entry"></div>
        <div id="history-detail-insight" class="history-detail-insight"></div>
      </div>
      <button onclick="newSession()" class="btn-ghost-neutral" style="width: 100%; margin-top: 1rem;">＋ New Session</button>
    </div>
  </div>

  <script>
    // ─── State ───────────────────────────────────────────────────────────────
    let controller;
    let sessionHistory = [];
    let mediaRecorder = null;
    let audioChunks = [];
    let isRecording = false;
    let stageTimer = null;
    // Models collaborate (draft -> verify -> refine) by default and the user is
    // never asked to choose. An operator can still revert the whole app to the
    // faster single-pass path with QUALITY_MODE_DEFAULT=false; loadModels()
    // reads that back so the UI stays consistent with the backend.
    let collaborativeMode = true;

    // ─── DOM refs ────────────────────────────────────────────────────────────
    const entryBox     = document.getElementById("journal-entry");
    const insightBox   = document.getElementById("insight-box");
    const stopBtn      = document.getElementById("stop-button");
    const historyList  = document.getElementById("history-list");
    const recordBtn    = document.getElementById("record-button");
    const recordStatus = document.getElementById("record-status");
    const charCounter  = document.getElementById("char-counter");
    const analyzeBtn   = document.getElementById("analyze-btn");
    const copyInsightBtn = document.getElementById("copy-insight-btn");

    // ─── Toast system ─────────────────────────────────────────────────────────
    function showToast(message, type = "info", duration = 3000) {
      const container = document.getElementById("toast-container");
      const toast = document.createElement("div");
      toast.className = `toast toast-${type}`;
      toast.textContent = message;
      container.appendChild(toast);
      // Trigger enter animation
      requestAnimationFrame(() => toast.classList.add("toast-visible"));
      setTimeout(() => {
        toast.classList.remove("toast-visible");
        toast.addEventListener("transitionend", () => toast.remove(), { once: true });
      }, duration);
    }

    // ─── Theme ───────────────────────────────────────────────────────────────
    function toggleTheme() {
      document.body.classList.toggle("light-mode");
    }

    // ─── Sidebar ─────────────────────────────────────────────────────────────
    function toggleSidebar() {
      document.getElementById("sidebar").classList.toggle("hidden");
    }

    // ─── Char counter ─────────────────────────────────────────────────────────
    entryBox.addEventListener("input", () => {
      const len = entryBox.value.length;
      charCounter.textContent = `${len} / 1000`;
      charCounter.className = "char-counter" + (len > 900 ? " char-warn" : "") + (len >= 1000 ? " char-limit" : "");
    });

    // ─── Quality mode stage indicator ────────────────────────────────────────
    function startStageIndicator() {
      const indicator = document.getElementById("stage-indicator");
      indicator.style.display = "flex";
      setStage("draft");
      // Approximate stage transitions (purely visual — server doesn't stream stages)
      stageTimer = setTimeout(() => setStage("verify"), 6000);
      stageTimer = setTimeout(() => setStage("revise"), 14000);
    }

    function setStage(stage) {
      ["draft", "verify", "revise"].forEach(s => {
        const el = document.getElementById(`stage-${s}`);
        el.classList.remove("stage-active", "stage-done");
      });
      const stages = ["draft", "verify", "revise"];
      const idx = stages.indexOf(stage);
      stages.forEach((s, i) => {
        const el = document.getElementById(`stage-${s}`);
        if (i < idx)       el.classList.add("stage-done");
        else if (i === idx) el.classList.add("stage-active");
      });
    }

    function stopStageIndicator(success = true) {
      clearTimeout(stageTimer);
      if (success) {
        setStage("revise");
        ["draft","verify","revise"].forEach(s =>
          document.getElementById(`stage-${s}`).classList.add("stage-done")
        );
      }
      setTimeout(() => {
        document.getElementById("stage-indicator").style.display = "none";
      }, 1200);
    }

    // ─── Structured analysis renderer ────────────────────────────────────────
    function renderAnalysisCards(analysis) {
      if (!analysis) return null;

      const el = document.createElement("div");
      el.className = "analysis-cards";

      // Summary
      if (analysis.summary) {
        const summary = document.createElement("p");
        summary.className = "analysis-summary";
        summary.textContent = analysis.summary;
        el.appendChild(summary);
      }

      // Crisis support takes priority over the reframe -- the gate clears
      // reframe whenever crisis_support is set, so these are mutually
      // exclusive, mirroring app._format_insight on the backend.
      if (analysis.crisis_support && analysis.support_message) {
        const support = document.createElement("p");
        support.className = "crisis-support-box";
        support.textContent = analysis.support_message;
        el.appendChild(support);
      } else if (analysis.reframe) {
        const reframe = document.createElement("p");
        reframe.className = "reframe-box";
        reframe.textContent = analysis.reframe;
        el.appendChild(reframe);
      }

      // Emotions
      if (analysis.emotions && analysis.emotions.length) {
        el.appendChild(buildSection("Emotions", () => {
          const pills = document.createElement("div");
          pills.className = "pill-group";
          analysis.emotions.forEach(e => {
            const pill = document.createElement("span");
            pill.className = "pill pill-emotion";
            pill.textContent = e;
            pills.appendChild(pill);
          });
          return pills;
        }));
      }

      // Patterns
      if (analysis.patterns && analysis.patterns.length) {
        el.appendChild(buildSection("Patterns", () => buildList(analysis.patterns, "pattern-list")));
      }

      // Triggers
      if (analysis.triggers && analysis.triggers.length) {
        el.appendChild(buildSection("Triggers", () => {
          const pills = document.createElement("div");
          pills.className = "pill-group";
          analysis.triggers.forEach(t => {
            const pill = document.createElement("span");
            pill.className = "pill pill-trigger";
            pill.textContent = t;
            pills.appendChild(pill);
          });
          return pills;
        }));
      }

      // Coping suggestions
      if (analysis.coping_suggestions && analysis.coping_suggestions.length) {
        el.appendChild(buildSection("Suggestions", () => buildList(analysis.coping_suggestions, "suggestions-list")));
      }

      // Journaling tips
      if (analysis.journaling_feedback && analysis.journaling_feedback.length) {
        el.appendChild(buildSection("Journaling tips", () => buildList(analysis.journaling_feedback, "suggestions-list")));
      }

      // Footer: confidence + quotes
      const footer = document.createElement("div");
      footer.className = "analysis-footer";

      if (typeof analysis.confidence === "number") {
        const pct = Math.round(analysis.confidence * 100);
        const badge = document.createElement("span");
        badge.className = `confidence-badge ${pct >= 80 ? "conf-high" : pct >= 60 ? "conf-mid" : "conf-low"}`;
        badge.textContent = `${pct}% confidence`;
        footer.appendChild(badge);
      }

      if (analysis.quotes_from_user && analysis.quotes_from_user.length) {
        const quotesBtn = document.createElement("button");
        quotesBtn.className = "quotes-toggle btn-ghost";
        quotesBtn.textContent = `💬 ${analysis.quotes_from_user.length} quote${analysis.quotes_from_user.length > 1 ? "s" : ""}`;
        const quotesList = document.createElement("ul");
        quotesList.className = "quotes-list";
        quotesList.style.display = "none";
        analysis.quotes_from_user.forEach(q => {
          const li = document.createElement("li");
          li.textContent = `"${q}"`;
          quotesList.appendChild(li);
        });
        quotesBtn.onclick = () => {
          const shown = quotesList.style.display !== "none";
          quotesList.style.display = shown ? "none" : "block";
          quotesBtn.textContent = shown
            ? `💬 ${analysis.quotes_from_user.length} quote${analysis.quotes_from_user.length > 1 ? "s" : ""}`
            : "💬 Hide quotes";
        };
        footer.appendChild(quotesBtn);
        footer.appendChild(quotesList);
      }

      if (footer.children.length) el.appendChild(footer);

      return el;
    }

    function buildSection(title, contentFn) {
      const section = document.createElement("div");
      section.className = "analysis-section";
      const h = document.createElement("h3");
      h.textContent = title;
      section.appendChild(h);
      section.appendChild(contentFn());
      return section;
    }

    function buildList(items, cls) {
      const ul = document.createElement("ul");
      ul.className = cls;
      items.forEach(item => {
        const li = document.createElement("li");
        li.textContent = item;
        ul.appendChild(li);
      });
      return ul;
    }

    // ─── Submit ───────────────────────────────────────────────────────────────
    // Analyze and Stop occupy the same slot in .run-controls; only one is ever
    // visible, so the primary CTA reads as "morphing" into Stop rather than a
    // permanently-visible disabled button sitting beside it.
    function setRunningState(isRunning) {
      analyzeBtn.style.display = isRunning ? "none" : "";
      stopBtn.style.display = isRunning ? "" : "none";
    }

    async function submitEntry() {
      const entry = entryBox.value.trim();
      if (!entry) { showToast("Write something first.", "warn"); return; }

      setRunningState(true);
      copyInsightBtn.style.display = "none";
      insightBox.innerHTML = "";

      if (collaborativeMode) {
        startStageIndicator();
      } else {
        insightBox.innerHTML = '<span class="thinking">Thinking...</span>';
      }

      controller = new AbortController();
      try {
        // No `model` is sent: the backend picks the generator for this machine
        // (see model_selection.get_runtime_model_selection).
        const response = await fetch("/analyze", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ entry, quality_mode: collaborativeMode }),
          signal: controller.signal
        });

        const data = await response.json();
        stopStageIndicator(!!data.insight);

        if (data.insight) {
          if (data.analysis) {
            const cards = renderAnalysisCards(data.analysis);
            insightBox.innerHTML = "";
            insightBox.appendChild(cards);
            insightBox.classList.add("animate-in");
          } else {
            revealTextSlowly(data.insight);
          }
          renderSources(data.analysis);
          storeMessage(entry, data.insight, data.analysis);
          copyInsightBtn.style.display = "inline-flex";
        } else {
          insightBox.textContent = data.error || "Something went wrong.";
          renderSources(null);
          showToast(data.error || "Analysis failed.", "error");
        }
      } catch (err) {
        stopStageIndicator(false);
        if (err.name !== "AbortError") {
          insightBox.textContent = "Request failed. Check that Ollama is running.";
          showToast("Request failed.", "error");
        } else {
          insightBox.textContent = "";
          showToast("Analysis stopped.", "info");
        }
      }

      entryBox.value = "";
      charCounter.textContent = "0 / 1000";
      charCounter.className = "char-counter";
      setRunningState(false);
    }

    // ─── Models ───────────────────────────────────────────────────────────────
    async function loadModels() {
      try {
        const response = await fetch("/models");
        const data = await response.json();
        const infoSummaryEl = document.getElementById("model-info-summary");
        const infoDetailsEl = document.getElementById("model-info-details");

        if (infoSummaryEl && data.summary) {
          infoSummaryEl.textContent = data.summary;
        }

        if (infoDetailsEl) {
          const profile = data.system_profile || {};
          const memory = typeof profile.total_memory_gb === "number" && profile.total_memory_gb > 0
            ? `${profile.total_memory_gb} GB RAM`
            : "memory unknown";
          const machineTier = profile.machine_tier || "auto";

          const details = [
            `Generator: ${data.generator}`,
            `Verifier: ${data.verifier}`,
            `Prompt: ${data.prompt}`,
            `Machine: ${machineTier}, ${memory}`,
          ];
          if (Array.isArray(data.missing_preferred) && data.missing_preferred.length) {
            details.push(`Missing recommended models: ${data.missing_preferred.join(", ")}`);
          }

          infoDetailsEl.innerHTML = "";
          details.forEach((text) => {
            const li = document.createElement("li");
            li.textContent = text;
            infoDetailsEl.appendChild(li);
          });
        }

        if (data.quality_mode_default !== undefined) {
          collaborativeMode = !!data.quality_mode_default;
        }
        const statusEl = document.getElementById("model-status-text");
        if (statusEl) {
          statusEl.textContent = collaborativeMode
            ? "Draft → Verify → Refine"
            : "Single-pass analysis";
        }
      } catch {
        // Silently use defaults
      }
    }

    window.addEventListener("load", () => {
      loadSessionHistory();
      loadModels();
    });

    // ─── Typewriter (legacy / plain text mode) ────────────────────────────────
    // formatLegacyText escapes the raw LLM text FIRST, then applies markdown-lite
    // substitutions on the escaped string -- the substitutions only ever insert
    // tags the code itself writes, so model output can never inject live HTML.
    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function formatLegacyText(text) {
      let safe = escapeHtml(text);
      safe = safe.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
      safe = safe.replace(/(?<!\*)\*([^*\n]+?)\*(?!\*)/g, "<em>$1</em>");
      safe = safe.replace(/^(?:-|•)\s+(.+)$/gm, "<li>$1</li>");
      safe = safe.replace(/(?:<li>.*<\/li>\n?)+/g, (match) => `<ul>${match}</ul>`);
      return safe.replace(/\n/g, "<br>");
    }

    function revealTextSlowly(text) {
      insightBox.textContent = "";
      const words = text.split(" ");
      let i = 0;
      const interval = setInterval(() => {
        if (i >= words.length) {
          clearInterval(interval);
          insightBox.innerHTML = formatLegacyText(text);
          return;
        }
        insightBox.textContent += words[i++] + " ";
      }, 60);
    }

    // ─── Copy insight ─────────────────────────────────────────────────────────
    function copyInsightText() {
      const text = insightBox.innerText || insightBox.textContent || "";
      if (!text.trim()) { showToast("Nothing to copy yet.", "warn"); return; }
      navigator.clipboard.writeText(text).then(
        () => showToast("Copied to clipboard.", "success"),
        () => showToast("Copy failed.", "error")
      );
    }

    // ─── History ──────────────────────────────────────────────────────────────
    function storeMessage(entry, insight, analysis) {
      const words = entry.split(" ");
      const title = words.slice(0, 5).join(" ") + (words.length > 5 ? "…" : "");
      sessionHistory.unshift({ title, entry, insight, analysis });
      renderHistory();
    }

    function renderHistory() {
      historyList.innerHTML = "";
      sessionHistory.forEach((item, idx) => {
        const li = document.createElement("li");
        li.className = "message-entry";
        li.setAttribute("role", "button");
        li.setAttribute("tabindex", "0");
        li.textContent = item.title;
        li.onclick = () => showHistoryDetail(idx);
        li.onkeydown = (e) => { if (e.key === "Enter" || e.key === " ") showHistoryDetail(idx); };
        historyList.appendChild(li);
      });
    }

    function showHistoryDetail(idx) {
      const item = sessionHistory[idx];
      const detail = document.getElementById("history-detail");
      document.getElementById("history-detail-entry").textContent = item.entry;
      const insightEl = document.getElementById("history-detail-insight");
      insightEl.innerHTML = "";
      if (item.analysis) {
        const cards = renderAnalysisCards(item.analysis);
        if (cards) insightEl.appendChild(cards);
      } else {
        insightEl.textContent = item.insight;
      }
      detail.style.display = "block";
      detail.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }

    function closeHistoryDetail() {
      document.getElementById("history-detail").style.display = "none";
    }

    // ─── Abort ────────────────────────────────────────────────────────────────
    function abortResponse() {
      if (controller) controller.abort();
      setRunningState(false);
    }

    // ─── Prompt suggestion ────────────────────────────────────────────────────
    async function getPrompt() {
      try {
        const res = await fetch("/prompt", { method: "POST" });
        const data = await res.json();
        if (data.prompt) {
          entryBox.value = data.prompt;
          entryBox.dispatchEvent(new Event("input"));
          entryBox.focus();
        } else {
          showToast("Could not get a prompt.", "error");
        }
      } catch {
        showToast("Failed to get a prompt.", "error");
      }
    }

    // ─── Session ──────────────────────────────────────────────────────────────
    async function loadSessionHistory() {
      try {
        const response = await fetch("/session/history");
        const backendHistory = await response.json();
        if (Array.isArray(backendHistory) && backendHistory.length > 0) {
          sessionHistory = backendHistory.map(item => {
            const words = item.entry.split(" ");
            return {
              title: words.slice(0, 5).join(" ") + (words.length > 5 ? "…" : ""),
              entry: item.entry,
              insight: item.response,
              analysis: item.analysis_json || null
            };
          });
          renderHistory();
        }
      } catch {
        // Silently fail
      }
    }

    async function newSession() {
      try {
        await fetch("/session/reset", { method: "POST" });
      } catch {
        // Continue even if reset fails
      }
      sessionHistory = [];
      historyList.innerHTML = "";
      insightBox.innerHTML = "";
      copyInsightBtn.style.display = "none";
      closeHistoryDetail();
      showToast("New session started.", "success");
    }

    // ─── Voice recording ──────────────────────────────────────────────────────
    async function toggleRecording() {
      if (isRecording) {
        isRecording = false;
        recordBtn.textContent = "🎙️";
        recordBtn.setAttribute("aria-label", "Start voice recording");
        recordStatus.textContent = "";
        if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
        return;
      }

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        showToast("Microphone not supported in this browser.", "error");
        return;
      }

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioChunks = [];
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = (e) => { if (e.data?.size > 0) audioChunks.push(e.data); };
        mediaRecorder.onstop = async () => {
          const blob = new Blob(audioChunks, { type: "audio/webm" });
          stream.getTracks().forEach(t => t.stop());
          await sendForTranscription(blob);
        };
        mediaRecorder.start();
        isRecording = true;
        recordBtn.textContent = "⏹️";
        recordBtn.setAttribute("aria-label", "Stop voice recording");
        recordStatus.textContent = "Recording… speak freely, then click Stop.";
      } catch (err) {
        showToast("Could not access microphone.", "error");
      }
    }

    async function sendForTranscription(blob) {
      recordStatus.textContent = "Transcribing…";
      try {
        const formData = new FormData();
        formData.append("audio", blob, "journal.webm");
        const res = await fetch("/transcribe", { method: "POST", body: formData });
        const data = await res.json();
        if (res.ok && data.text) {
          const current = entryBox.value.trim();
          entryBox.value = (current ? current + "\n" : "") + data.text;
          entryBox.dispatchEvent(new Event("input"));
          recordStatus.textContent = `Transcribed (${data.language}). You can edit before analyzing.`;
        } else {
          recordStatus.textContent = "Transcription failed.";
          showToast("Transcription failed.", "error");
        }
      } catch {
        recordStatus.textContent = "Transcription failed.";
        showToast("Transcription failed.", "error");
      }
    }

    // ─── Sources ──────────────────────────────────────────────────────────────
    function renderSources(analysis) {
      const container = document.getElementById("sources-container");
      const list      = document.getElementById("sources-list");
      const toggle    = document.getElementById("sources-toggle");
      if (!analysis || !Array.isArray(analysis.grounding_sources) || !analysis.grounding_sources.length) {
        container.style.display = "none";
        list.innerHTML = "";
        return;
      }
      const mode  = analysis.grounding_mode || "local_chroma";
      const label = mode === "pinecone" ? "Pinecone" : "Local Chroma";
      let html = `<div class="sources-label">Sources (${label}):</div>`;
      analysis.grounding_sources.forEach((s, i) => {
        const score = typeof s.score === "number" ? s.score.toFixed(3) : s.score;
        html += `<div class="source-item">[#${i + 1}] score=${score} – ${s.preview}</div>`;
      });
      list.innerHTML = html;
      container.style.display = "block";
      list.style.display = "none";
      toggle.textContent = "🔍 Show sources";
    }

    function toggleSources() {
      const list   = document.getElementById("sources-list");
      const toggle = document.getElementById("sources-toggle");
      const shown  = list.style.display !== "none";
      list.style.display = shown ? "none" : "block";
      toggle.textContent = shown ? "🔍 Show sources" : "🔍 Hide sources";
    }

    // ─── Info tooltips ────────────────────────────────────────────────────────
    // Kept as a list (rather than a single pair) so the outside-click handler
    // stays correct if another panel is added later.
    const INFO_PANELS = [
      { panelId: "model-info", iconId: "model-info-icon" },
    ];

    function toggleInfoPanel(panelId, iconId) {
      const panel = document.getElementById(panelId);
      const icon = document.getElementById(iconId);
      const open = panel.style.display === "none";
      panel.style.display = open ? "block" : "none";
      icon.setAttribute("aria-expanded", open);
    }

    function toggleModelInfo() { toggleInfoPanel("model-info", "model-info-icon"); }

    document.addEventListener("click", (e) => {
      INFO_PANELS.forEach(({ panelId, iconId }) => {
        const panel = document.getElementById(panelId);
        const icon = document.getElementById(iconId);
        if (panel && icon && panel.style.display !== "none" && !panel.contains(e.target) && !icon.contains(e.target)) {
          panel.style.display = "none";
          icon.setAttribute("aria-expanded", "false");
        }
      });
    });

    // ─── Keyboard shortcuts ───────────────────────────────────────────────────
    entryBox.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        submitEntry();
      }
    });
  </script>
</body>
</html>
