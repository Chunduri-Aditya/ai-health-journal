[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -q --strict-markers -m "not integration and not slow"
markers =
    integration: requires a live Ollama or other external service
    slow: test takes longer than one second
filterwarnings =
    ignore::DeprecationWarning:pydantic.*
